<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Mi Universidad</title>
    <link rel="stylesheet" href="reportes.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- LIBRERÍAS PARA EXPORTACIÓN - CDN CORRECTAS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Botón de regreso y modo oscuro -->
    <div class="back-button-container">
        <button class="btn-back" onclick="goBackToDashboard()">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </button>
        <button class="btn-dark-mode" onclick="toggleDarkMode()" id="darkModeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="container reportes-container py-4">
        <div class="page-header mb-4">
            <h2><i class="fas fa-file-alt"></i> Generador de Reportes</h2>
            <p>Genera y exporta reportes académicos y administrativos</p>
        </div>

        <div class="config-panel mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-sliders-h"></i> Configuración del Reporte</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label><i class="fas fa-file-pdf"></i> Tipo de Reporte</label>
                            <select id="tipoReporte" class="form-select" onchange="cambiarTipoReporte()">
                                <option value="academico">📊 Reporte Académico</option>
                                <option value="calificaciones">📝 Reporte de Calificaciones</option>
                                <option value="asistencia">📋 Reporte de Asistencia</option>
                                <option value="usuarios">👥 Reporte de Usuarios</option>
                                <option value="kardex">📚 Reporte de Kardex</option>
                                <option value="rendimiento">📈 Reporte de Rendimiento</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label><i class="fas fa-calendar-alt"></i> Período</label>
                            <select id="periodo" class="form-select">
                                <option value="2024-1">Enero - Junio 2024</option>
                                <option value="2024-2" selected>Agosto - Diciembre 2024</option>
                                <option value="2025-1">Enero - Junio 2025</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label><i class="fas fa-chalkboard"></i> Curso (opcional)</label>
                            <select id="curso" class="form-select">
                                <option value="todos">Todos los cursos</option>
                                <option value="1">Matemáticas IV (MAT-304)</option>
                                <option value="2">Desarrollo Web Avanzado (WEB-401)</option>
                                <option value="3">Bases de Datos Avanzadas (BD-401)</option>
                                <option value="4">Programación Móvil (MOV-402)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3" id="carreraContainer" style="display: none;">
                            <label><i class="fas fa-graduation-cap"></i> Carrera</label>
                            <select id="carrera" class="form-select">
                                <option value="todas">Todas las carreras</option>
                                <option value="Ingeniería en Sistemas">Ingeniería en Sistemas</option>
                                <option value="Administración">Administración</option>
                                <option value="Derecho">Derecho</option>
                                <option value="Psicología">Psicología</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label><i class="fas fa-file-export"></i> Formato de Exportación</label>
                            <div class="formato-buttons">
                                <button class="btn-formato pdf" onclick="setFormato('pdf')">📄 PDF</button>
                                <button class="btn-formato excel" onclick="setFormato('excel')">📊 Excel</button>
                                <button class="btn-formato word" onclick="setFormato('word')">📝 Word</button>
                                <button class="btn-formato print" onclick="setFormato('print')">🖨️ Imprimir</button>
                            </div>
                        </div>
                    </div>
                    <div class="text-end mt-3">
                        <button class="btn-generar" onclick="generarReporte()">
                            <i class="fas fa-cogs"></i> Generar Reporte
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-eye"></i> Vista Previa del Reporte</h5>
                </div>
                <div class="card-body" id="reportePreview">
                    <div class="text-center py-5">
                        <i class="fas fa-file-alt" style="font-size: 4rem; color: #ccc;"></i>
                        <h4 class="mt-3 text-muted">Selecciona un tipo de reporte</h4>
                        <p class="text-muted">Configura los parámetros y haz clic en "Generar Reporte"</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="reportes.js"></script>
    <script src="dark-mode.js"></script>
</body>
</html>
