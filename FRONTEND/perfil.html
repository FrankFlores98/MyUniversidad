<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Mi Universidad</title>
    <link rel="stylesheet" href="../css/perfil.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dark-mode.css">
        <script src="perfil.js"></script>
</head>
<body>
    <!-- Botón de regreso - Lo pones al inicio del body -->
<div class="back-button-container">
    <button class="btn-back" onclick="goBackToDashboard()">
        <i class="fas fa-arrow-left"></i> Volver al Dashboard
        
    </button>
</div>
    <div class="container profile-container py-4">
        <div class="row">
            <!-- Columna izquierda - Foto y datos básicos -->
            <div class="col-lg-4 mb-4">
                <div class="card profile-card text-center">
                    <div class="card-body">
                        <div class="profile-avatar mb-3">
                            <div class="avatar-circle" id="avatarCircle">
                                <span id="avatarLetter">U</span>
                            </div>
                            <button class="btn-change-avatar" onclick="changeAvatar()">
                                <i class="fas fa-camera"></i>
                            </button>
                        </div>
                        <h4 id="profileNombre" class="mt-3">Cargando...</h4>
                        <p class="text-muted" id="profileRol"></p>
                        
                        <div class="info-badge">
                            <i class="fas fa-id-card"></i>
                            <span>Matrícula: <strong id="profileMatricula"></strong></span>
                        </div>
                        <div class="info-badge">
                            <i class="fas fa-envelope"></i>
                            <span>Correo: <strong id="profileEmail"></strong></span>
                        </div>
                        <div class="info-badge">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Miembro desde: <strong id="profileFecha"></strong></span>
                        </div>
                        
                        <hr>
                        <button class="btn btn-outline-primary btn-sm w-100" onclick="editProfile()">
                            <i class="fas fa-edit"></i> Editar Perfil
                        </button>
                    </div>
                </div>
            </div>

            <!-- Columna derecha - Formularios -->
            <div class="col-lg-8">
                <!-- Información Personal -->
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-user-circle"></i> Información Personal</h5>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-user"></i> Nombre Completo</label>
                                    <input type="text" class="form-control" id="nombre" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                                    <input type="email" class="form-control" id="email" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-id-card"></i> Matrícula</label>
                                    <input type="text" class="form-control" id="matricula" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-tag"></i> Rol</label>
                                    <input type="text" class="form-control" id="rol" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-phone"></i> Teléfono</label>
                                    <input type="tel" class="form-control" id="telefono" placeholder="Ej: 5512345678">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label><i class="fas fa-calendar-alt"></i> Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fechaNacimiento">
                                </div>
                                <div class="col-12 mb-3">
                                    <label><i class="fas fa-map-marker-alt"></i> Dirección</label>
                                    <input type="text" class="form-control" id="direccion" placeholder="Tu dirección completa">
                                </div>
                            </div>
                            <div class="text-end">
                                <button type="button" class="btn btn-success" onclick="saveProfile()">
                                    <i class="fas fa-save"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Cambiar Contraseña -->
                <div class="card mb-4">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="fas fa-key"></i> Cambiar Contraseña</h5>
                    </div>
                    <div class="card-body">
                        <form id="passwordForm">
                            <div class="mb-3">
                                <label>Contraseña Actual</label>
                                <input type="password" class="form-control" id="currentPassword" placeholder="Ingresa tu contraseña actual">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Nueva Contraseña</label>
                                    <input type="password" class="form-control" id="newPassword" placeholder="Mínimo 6 caracteres">
                                    <small class="text-muted">Mínimo 6 caracteres</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Confirmar Nueva Contraseña</label>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu nueva contraseña">
                                </div>
                            </div>
                            <button type="button" class="btn btn-warning" onclick="changePassword()">
                                <i class="fas fa-sync-alt"></i> Actualizar Contraseña
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Información Académica (solo para alumnos) -->
                <div class="card academic-info" id="academicCard" style="display: none;">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="fas fa-graduation-cap"></i> Información Académica</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label>Carrera</label>
                                <input type="text" class="form-control" id="carrera" readonly>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Semestre</label>
                                <input type="text" class="form-control" id="semestre" readonly>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Promedio</label>
                                <input type="text" class="form-control" id="promedio" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-check-circle"></i> Éxito</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalMessage">
                    Datos guardados correctamente
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="perfil.js"></script>
    <script src="dark-mode.js"></script>
</body>
</html>
