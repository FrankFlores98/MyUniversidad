<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Anuncios Institucionales - Mi Universidad</title>
    <link rel="stylesheet" href="anuncios..css">
    <link rel="stylesheet" href="dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ========== BOTONES SUPERIORES ========== -->
    <div class="back-button-container">
        <div class="back-left">
            <button class="btn-back" onclick="goBackToDashboard()">
                <i class="fas fa-arrow-left"></i> Volver al Dashboard
            </button>
        </div>
        <div class="back-right">
            <button class="btn-refresh" onclick="cargarAnuncios()" title="Actualizar anuncios">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="btn-dark-mode" onclick="toggleDarkMode()" id="darkModeBtn">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <!-- ========== CONTENEDOR PRINCIPAL ========== -->
    <div class="container anuncios-container">
        
        <!-- ========== ENCABEZADO ========== -->
        <div class="page-header">
            <div class="page-header-icon">
                <i class="fas fa-bullhorn"></i>
            </div>
            <h2>Anuncios Institucionales</h2>
            <p>Comunicados oficiales de la universidad</p>
            <div class="header-stats">
                <div class="stat-badge">
                    <i class="fas fa-newspaper"></i>
                    <span id="anunciosCount">0</span>
                    <small>Anuncios</small>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-eye"></i>
                    <span id="vistasTotales">0</span>
                    <small>Vistas</small>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-calendar-week"></i>
                    <span id="semanaActual">Semana 34</span>
                    <small>2024</small>
                </div>
            </div>
        </div>

        <!-- ========== FILTROS ========== -->
        <div class="filtros-container" id="filtrosContainer">
            <div class="filtros-header">
                <i class="fas fa-filter"></i>
                <span>Filtrar anuncios</span>
            </div>
            <div class="filtros-buttons">
                <button class="filtro-btn active" onclick="filtrarPorCategoria('todos')">
                    <i class="fas fa-globe"></i> Todos
                </button>
                <button class="filtro-btn" onclick="filtrarPorCategoria('alumnos')">
                    <i class="fas fa-user-graduate"></i> Alumnos
                </button>
                <button class="filtro-btn" onclick="filtrarPorCategoria('maestros')">
                    <i class="fas fa-chalkboard-teacher"></i> Maestros
                </button>
                <button class="filtro-btn" onclick="filtrarPorCategoria('destacados')">
                    <i class="fas fa-star"></i> Destacados
                </button>
            </div>
            <div class="filtros-search">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="buscarAnuncio" placeholder="Buscar anuncio..." onkeyup="buscarAnuncios()">
                    <button class="btn-clear-search" onclick="limpiarBusqueda()" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- ========== FORMULARIO CREAR ANUNCIO (SOLO ADMIN/DIRECTIVO) ========== -->
        <div id="formAnuncio" class="form-anuncio-card" style="display: none;">
            <div class="form-header">
                <i class="fas fa-edit"></i>
                <h5>Crear Nuevo Anuncio</h5>
                <span class="form-badge">Solo personal autorizado</span>
            </div>
            <div class="form-body">
                <div class="row g-4">
                    <div class="col-md-8">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Título del Anuncio <span class="required">*</span></label>
                            <input type="text" id="tituloAnuncio" class="form-control" placeholder="Ej: Suspensión de clases, Convocatoria de becas...">
                            <small class="form-hint">Máximo 100 caracteres</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label><i class="fas fa-users"></i> Dirigido a <span class="required">*</span></label>
                            <select id="dirigidoA" class="form-select">
                                <option value="todos">📢 Todos (Alumnos y Maestros)</option>
                                <option value="alumnos">🎓 Solo Alumnos</option>
                                <option value="maestros">👨‍🏫 Solo Maestros</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-calendar-alt"></i> Fecha de publicación</label>
                            <input type="date" id="fechaPublicacion" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-star"></i> Marcar como destacado</label>
                            <div class="toggle-switch">
                                <label class="switch">
                                    <input type="checkbox" id="destacadoSwitch">
                                    <span class="slider round"></span>
                                </label>
                                <span class="toggle-label">Destacar este anuncio</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i> Mensaje <span class="required">*</span></label>
                            <textarea id="mensajeAnuncio" class="form-control" rows="5" placeholder="Escribe el contenido del anuncio..."></textarea>
                            <small class="form-hint" id="contadorCaracteres">0 / 500 caracteres</small>
                        </div>
                    </div>
                    <div class="col-12 text-end">
                        <button class="btn-cancelar" onclick="limpiarFormulario()">
                            <i class="fas fa-eraser"></i> Limpiar
                        </button>
                        <button class="btn-publicar" onclick="publicarAnuncio()">
                            <i class="fas fa-paper-plane"></i> Publicar Anuncio
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== LISTA DE ANUNCIOS ========== -->
        <div class="anuncios-list-card">
            <div class="list-header">
                <i class="fas fa-list"></i>
                <h5>Anuncios Recientes</h5>
                <div class="list-actions">
                    <button class="btn-vista" onclick="cambiarVista('grid')" title="Vista de cuadrícula">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button class="btn-vista" onclick="cambiarVista('lista')" title="Vista de lista">
                        <i class="fas fa-list-ul"></i>
                    </button>
                    <button class="btn-vista" onclick="ordenarAnuncios()" title="Ordenar por fecha">
                        <i class="fas fa-sort-amount-down"></i>
                    </button>
                </div>
            </div>
            <div class="anuncios-list" id="listaAnuncios">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Cargando anuncios...</p>
                </div>
            </div>
            <div class="list-footer" id="listFooter" style="display: none;">
                <button class="btn-cargar-mas" onclick="cargarMasAnuncios()">
                    <i class="fas fa-arrow-down"></i> Cargar más anuncios
                </button>
            </div>
        </div>

        <!-- ========== MODAL DE DETALLE DE ANUNCIO ========== -->
        <div class="modal fade" id="detalleAnuncioModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" id="modalHeader">
                        <h5 class="modal-title" id="modalTitulo">Detalle del Anuncio</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="modalBody">
                        <!-- Contenido dinámico -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="button" class="btn btn-primary" id="modalCompartirBtn" onclick="compartirAnuncio()">
                            <i class="fas fa-share-alt"></i> Compartir
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== TOAST NOTIFICACIONES ========== -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="anuncios.js"></script>
    <script src="dark-mode.js"></script>
</body>
</html>
</html>
